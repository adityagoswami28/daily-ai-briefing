name: Daily AI Briefing

on:
  schedule:
    # 8:00 AM EST = 13:00 UTC (standard time)
    # 8:00 AM EDT = 12:00 UTC (daylight saving)
    # Using 13:00 UTC for EST - adjust if needed
    - cron: '0 13 * * *'

  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  send-briefing:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run briefing script
        env:
          # Gmail SMTP
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}

          # Reddit API (optional - only needed if INCLUDE_REDDIT is true)
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: 'DailyAIBriefing/1.0 (GitHub Actions)'

          # OpenAI API (for AI summaries)
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

          # Settings
          TIMEZONE: 'America/New_York'
          MAX_ARTICLES: '40'
          MAX_AGE_HOURS: '72'

          # Feature flags
          INCLUDE_RSS: 'true'
          INCLUDE_HACKERNEWS: 'true'
          INCLUDE_REDDIT: 'false'
          INCLUDE_ARXIV: 'true'
          ENABLE_AI_SUMMARY: 'true'

        run: python -m src.main

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs-${{ github.run_id }}
          path: |
            *.log
          retention-days: 7
